<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>관리자 페이지 | EZ-STEP</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{--blue:#1976D2;--navy:#0D1B4B;--black:#1A1A2E;--gray:#6B7280;--gray-light:#F3F4F6;--gray-mid:#E5E7EB;--white:#FFFFFF;--green:#10B981;--yellow:#F59E0B;--red:#EF4444;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--gray-light);color:var(--black);}
.admin-header{background:var(--navy);color:white;padding:16px 5%;display:flex;align-items:center;justify-content:space-between;}
.admin-header h1{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:10px;}
.admin-header a{color:rgba(255,255,255,0.7);text-decoration:none;font-size:13px;font-weight:500;}
.admin-header a:hover{color:white;}
.admin-main{max-width:1100px;margin:0 auto;padding:32px 20px;}
.admin-title{font-size:1.4rem;font-weight:800;color:var(--navy);margin-bottom:24px;}
.order-card{background:var(--white);border-radius:14px;border:1px solid var(--gray-mid);padding:24px;margin-bottom:16px;transition:box-shadow 0.2s;}
.order-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.06);}
.order-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.order-id{font-family:'Inter',monospace;font-size:13px;font-weight:700;color:var(--blue);background:rgba(25,118,210,0.08);padding:4px 12px;border-radius:8px;}
.order-time{font-size:12px;color:var(--gray);}
.order-school{font-size:1.2rem;font-weight:800;color:var(--navy);margin:12px 0 8px;}
.order-meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
.meta-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray);}
.meta-item i{color:var(--blue);}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.chip{padding:3px 10px;border-radius:999px;font-size:12px;font-weight:500;}
.chip-section{background:rgba(16,185,129,0.1);color:#059669;}
.chip-addon{background:rgba(245,158,11,0.1);color:#D97706;}
.order-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:16px;border-top:1px solid var(--gray-mid);}
.action-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;font-family:inherit;}
.btn-deploy{background:var(--blue);color:white;}
.btn-deploy:hover{background:#0D47A1;}
.btn-preview{background:var(--gray-light);color:var(--navy);border:1px solid var(--gray-mid);}
.btn-preview:hover{background:var(--gray-mid);}
.btn-copy{background:rgba(16,185,129,0.1);color:#059669;border:1px solid rgba(16,185,129,0.2);}
.btn-copy:hover{background:rgba(16,185,129,0.2);}
.cmd-box{
  background:#1a1a2e;color:#4ade80;
  font-family:'Inter',monospace;font-size:13px;
  padding:14px 16px;border-radius:10px;
  margin-top:12px;display:none;
  white-space:pre-wrap;word-break:break-all;
  line-height:1.7;
}
.cmd-box.show{display:block;}
.empty-state{text-align:center;padding:80px;color:var(--gray);}
.empty-state i{font-size:3rem;margin-bottom:16px;opacity:0.3;}
.loading{text-align:center;padding:60px;color:var(--gray);}
.stats-row{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
.stat-card{background:var(--white);border-radius:12px;border:1px solid var(--gray-mid);padding:16px 24px;flex:1;min-width:140px;}
.stat-card .num{font-size:2rem;font-weight:800;color:var(--navy);}
.stat-card .lbl{font-size:12px;color:var(--gray);margin-top:2px;}
</style>
</head>
<body>
<div class="admin-header">
  <h1><i class="fa-solid fa-shield-halved"></i> EZ-STEP 관리자</h1>
  <div style="display:flex;gap:20px;">
    <a href="/">← 메인으로</a>
    <a href="/builder">차트 빌더</a>
  </div>
</div>

<div class="admin-main">
  <div class="admin-title">📋 차트 생성 신청 목록</div>
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="num" id="statTotal">-</div><div class="lbl">전체 신청</div></div>
    <div class="stat-card"><div class="num" id="statToday">-</div><div class="lbl">오늘 신청</div></div>
    <div class="stat-card"><div class="num" id="statSchools">-</div><div class="lbl">학교 수</div></div>
  </div>
  <div id="orderList"><div class="loading"><i class="fa-solid fa-spinner fa-spin"></i><br/>데이터 불러오는 중...</div></div>
</div>

<script>
async function loadOrders() {
  try {
    const res = await fetch('/api/orders');
    const orders = await res.json();

    // 통계
    const today = new Date().toISOString().split('T')[0];
    const todayCount = orders.filter(o => o.submittedAt?.startsWith(today)).length;
    const schools = new Set(orders.map(o => o.schoolName)).size;
    document.getElementById('statTotal').textContent = orders.length;
    document.getElementById('statToday').textContent = todayCount;
    document.getElementById('statSchools').textContent = schools;

    const list = document.getElementById('orderList');
    if (orders.length === 0) {
      list.innerHTML = `<div class="empty-state"><i class="fa-regular fa-inbox"></i><br/>아직 신청 내역이 없습니다.</div>`;
      return;
    }

    list.innerHTML = orders.map(order => {
      const sectionCount = Object.keys(order.sections || {}).length;
      const addons = Object.entries(order.addons || {}).filter(([,v])=>v).map(([k])=>k);
      const addonLabels = {dashboard:'대시보드',ai:'AI',calc:'자동계산',photo:'사진',reservation:'예약'};
      const time = new Date(order.submittedAt).toLocaleString('ko-KR');

      const previewConfig = encodeURIComponent(JSON.stringify({
        schoolName: order.schoolName,
        grades: order.grades,
        sections: Object.fromEntries(
          Object.entries(order.sections||{}).map(([k,v])=>[k,{selected:true,items:{}}])
        ),
        addons: order.addons || {}
      }));

      const deployCmd = `npm run create-school -- --id="${order.id}"`;

      return `
      <div class="order-card">
        <div class="order-top">
          <span class="order-id">${order.id}</span>
          <span class="order-time"><i class="fa-regular fa-clock"></i> ${time}</span>
        </div>
        <div class="order-school">${order.schoolName || '(미입력)'}</div>
        <div class="order-meta">
          <span class="meta-item"><i class="fa-solid fa-graduation-cap"></i> ${(order.grades||[]).join(', ')}</span>
          <span class="meta-item"><i class="fa-solid fa-layer-group"></i> 섹션 ${sectionCount}개</span>
          <span class="meta-item"><i class="fa-solid fa-puzzle-piece"></i> 부가기능 ${addons.length}개</span>
        </div>
        ${sectionCount > 0 ? `
        <div class="chips">
          ${Object.entries(order.sections||{}).map(([k])=>`<span class="chip chip-section">Section ${k}</span>`).join('')}
        </div>` : ''}
        ${addons.length > 0 ? `
        <div class="chips">
          ${addons.map(k=>`<span class="chip chip-addon">${addonLabels[k]||k}</span>`).join('')}
        </div>` : ''}
        <div class="order-actions">
          <button class="action-btn btn-deploy" onclick="showCmd('${order.id}')">
            <i class="fa-solid fa-rocket"></i> 배포 명령어 보기
          </button>
          <a class="action-btn btn-preview" href="/preview?config=${previewConfig}" target="_blank">
            <i class="fa-solid fa-eye"></i> 미리보기
          </a>
          <button class="action-btn btn-copy" onclick="copyCmd('${order.id}','${deployCmd.replace(/"/g,'&quot;')}')">
            <i class="fa-solid fa-copy"></i> 명령어 복사
          </button>
        </div>
        <div class="cmd-box" id="cmd_${order.id}">$ ${deployCmd}

# 위 명령어를 터미널에서 실행하면 자동으로 배포됩니다.
# 완료 후 생성된 링크를 ${order.schoolName || '학교'} 담당자에게 전달하세요.</div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('orderList').innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><br/>데이터를 불러오지 못했습니다.<br/><small>${e.message}</small></div>`;
  }
}

function showCmd(id) {
  const box = document.getElementById('cmd_' + id);
  if (box) box.classList.toggle('show');
}

function copyCmd(id, cmd) {
  const decoded = cmd.replace(/&quot;/g,'"');
  navigator.clipboard.writeText(decoded).then(() => {
    alert('명령어가 복사되었습니다!\n\n' + decoded);
  });
}

loadOrders();
setInterval(loadOrders, 30000); // 30초마다 갱신
</script>
</body>
</html>
