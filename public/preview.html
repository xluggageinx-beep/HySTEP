<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>차트 미리보기 | Hy-STEP</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'Noto Sans KR', sans-serif; }
  :root { --primary: #0059D7; }

  /* ── 미리보기 배너 ── */
  .preview-banner {
    position: sticky; top: 0; z-index: 200;
    background: linear-gradient(90deg, #F59E0B, #D97706);
    color: white; padding: 10px 20px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 14px; font-weight: 600;
  }

  /* ── 섹션 버튼 (기존 차트웹 동일) ── */
  .section-button {
    background: white;
    border: 2px solid #0059D7;
    padding: 20px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    text-align: left;
  }
  .section-button:hover {
    background: #0059D7; color: white;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0,89,215,0.3);
  }
  .section-number {
    background: #0059D7; color: white;
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 18px; flex-shrink: 0;
  }
  .section-button:hover .section-number { background: white; color: #0059D7; }

  /* ── 모달 오버레이 ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 500;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: white; border-radius: 16px;
    width: min(900px, 96vw); max-height: 92vh;
    overflow-y: auto;
    margin: auto;
    padding: 0;
  }
  .modal-sticky-bar {
    position: sticky; top: 0; z-index: 10;
    background: white; padding: 12px 20px;
    border-bottom: 1px solid #e5e7eb;
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-content { padding: 24px 28px 32px; }

  /* ── 기존 차트웹 section-content 스타일 ── */
  .section-content {}
  .btn-primary {
    background: #0059D7; color: white;
    padding: 8px 20px; border-radius: 8px;
    border: none; font-size: 14px; font-weight: 700; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary:hover { background: #0047b3; }
  .btn-secondary {
    background: #f3f4f6; color: #374151;
    padding: 8px 20px; border-radius: 8px;
    border: 1px solid #e5e7eb; font-size: 14px; font-weight: 600; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-secondary:hover { background: #e5e7eb; }

  /* ── 목표 달성도 버튼 ── */
  .goal-status-btn {
    padding: 10px 20px; border-radius: 8px; font-weight: 600;
    border: 2px solid #e5e7eb; background: white; cursor: pointer;
    transition: all 0.2s;
  }
  .goal-status-btn[data-status="selected"][data-type="met"] {
    background: #10B981; color: white; border-color: #10B981;
  }
  .goal-status-btn[data-status="selected"][data-type="partial"] {
    background: #F59E0B; color: white; border-color: #F59E0B;
  }
  .goal-status-btn[data-status="selected"][data-type="unmet"] {
    background: #EF4444; color: white; border-color: #EF4444;
  }

  /* ── 저장 불가 안내 ── */
  .nosave-note {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 24px; padding: 10px 16px;
    background: rgba(245,158,11,0.1); border-radius: 8px;
    font-size: 13px; color: #D97706; font-weight: 500;
    border: 1px solid rgba(245,158,11,0.3);
  }

  /* ── 반응형 ── */
  @media (max-width: 600px) {
    .modal-content { padding: 16px; }
    .grid-cols-2 { grid-template-columns: 1fr !important; }
  }

  /* ── PI 다이어그램 ── */
  .pi-cell-wrap {
    position: relative; width: 48px; height: 48px; margin: auto;
  }
  .pi-surf {
    position: absolute; width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid #d1d5db; cursor: pointer; transition: all 0.15s;
    background: white;
  }
  .pi-surf:hover { border-color: #0059D7; }
  .pi-surf.hit { background: #EF4444; border-color: #EF4444; }
  .pi-surf.top  { top: 2px;  left: 50%; transform: translateX(-50%); }
  .pi-surf.right{ top: 50%; right: 2px;  transform: translateY(-50%); }
  .pi-surf.bottom{ bottom: 2px; left: 50%; transform: translateX(-50%); }
  .pi-surf.left { top: 50%; left: 2px;  transform: translateY(-50%); }
</style>
</head>
<body class="bg-gray-100 min-h-screen">

<!-- 미리보기 배너 -->
<div class="preview-banner">
  <div style="display:flex;align-items:center;gap:8px;">
    <i class="fa-solid fa-eye"></i>
    <span>미리보기 모드 — 데이터 저장 없음 | 대상자: 홍길동 (임시 고정)</span>
  </div>
  <button onclick="window.close()" style="padding:5px 14px;border-radius:7px;background:rgba(255,255,255,0.25);color:white;border:1px solid rgba(255,255,255,0.4);font-size:13px;font-weight:600;cursor:pointer;">
    <i class="fa-solid fa-xmark"></i> 닫기
  </button>
</div>

<!-- 메인 컨테이너 -->
<div class="container mx-auto px-4 py-8" style="max-width:960px;">

  <!-- 상단 헤더 (기존 차트웹 동일 구조) -->
  <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
    <div class="flex justify-between items-start mb-4" style="gap:8px;flex-wrap:wrap;">
      <h1 class="text-3xl font-bold" style="color:#0059D7;flex:1;min-width:0;">
        <i class="fas fa-file-medical mr-2"></i>
        <span id="chartTitle">Hy-STEP 임상실습 차트</span>
      </h1>
      <div class="flex gap-3" style="flex-shrink:0;flex-wrap:wrap;">
        <!-- Photo 버튼 (차트웹 동일: 초록색) — addon.photo 활성 시만 표시 -->
        <button id="pvPhotoBtn" onclick="openPhotoModalPv()" style="display:none;background:#10B981;color:white;border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;align-items:center;gap:6px;">
          <i class="fas fa-camera"></i> Photo
        </button>
        <button style="background:#0059D7;color:white;border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:700;cursor:not-allowed;display:flex;align-items:center;gap:6px;opacity:0.5;" title="미리보기 모드에서는 저장되지 않습니다">
          <i class="fas fa-save"></i> 저장하기
        </button>
        <button onclick="window.close()" style="background:#6b7280;color:white;border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;">
          <i class="fas fa-arrow-left"></i> 닫기
        </button>
      </div>
    </div>

    <!-- 대상자 정보 (기존 차트웹 동일) -->
    <div class="bg-blue-50 rounded-lg p-4">
      <h2 class="text-xl font-semibold mb-3" style="color:#0059D7;">대상자 정보</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div><p class="text-gray-600 text-sm">이름</p><p class="font-semibold">홍길동</p></div>
        <div><p class="text-gray-600 text-sm">전화번호</p><p class="font-semibold">010-1234-5678</p></div>
        <div><p class="text-gray-600 text-sm">생년월일/연령</p><p class="font-semibold">2000.01.01 / 26세</p></div>
        <div><p class="text-gray-600 text-sm">성별</p><p class="font-semibold">남성</p></div>
        <div><p class="text-gray-600 text-sm">주소</p><p class="font-semibold">충청남도 천안시</p></div>
        <div><p class="text-gray-600 text-sm">직업</p><p class="font-semibold">-</p></div>
        <div><p class="text-gray-600 text-sm">술자와의 관계</p><p class="font-semibold">-</p></div>
        <div><p class="text-gray-600 text-sm">방문이유</p><p class="font-semibold">구강검진</p></div>
      </div>
    </div>
  </div>

  <!-- 섹션 선택 그리드 -->
  <div class="bg-white rounded-2xl shadow-lg p-6">
    <h2 class="text-2xl font-bold mb-6" style="color:#0059D7;">
      <i class="fas fa-list-check mr-2"></i>차트 섹션
    </h2>
    <div class="grid gap-4 section-grid" id="sectionGrid"
         style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr));"></div>
  </div>

  <!-- ── 부가기능 패널 (addon 선택 시 표시) ── -->
  <div id="addonPanels"></div>

</div>

<!-- 섹션 모달 -->
<div class="modal-overlay" id="sectionModal">
  <div class="modal-box">
    <div class="modal-sticky-bar">
      <h2 id="modalTitle" class="text-xl font-bold" style="color:#0059D7;"></h2>
      <button onclick="closeModal()" style="padding:6px 16px;border-radius:8px;background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;font-size:13px;font-weight:600;cursor:pointer;">
        <i class="fas fa-arrow-left mr-1"></i>목록으로
      </button>
    </div>
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>

<script>
// ── config 파싱 ────────────────────────────────────────────────────
let config = {};
try {
  const p = new URLSearchParams(window.location.search);
  const raw = p.get('config');
  if (raw) config = JSON.parse(decodeURIComponent(raw));
} catch(e) {
  config = { schoolName:'미리보기', grades:['2학년'], sections:{
    1:{selected:true,items:{}}, 2:{selected:true,items:{}},
    3:{selected:true,items:{}}, 4:{selected:true,items:{}},
    5:{selected:true,items:{}}, 6:{selected:true,items:{}},
    7:{selected:true,items:{}}, 8:{selected:true,items:{}},
    9:{selected:true,items:{}}
  }, addons:{} };
}

if (config.schoolName) {
  document.getElementById('chartTitle').textContent =
    config.schoolName + ' Hy-STEP 임상실습 차트 (미리보기)';
}

// ── 섹션 메타 (원래 번호 → 레이블/아이콘) ────────────────────────
const SECTION_META = {
  1:{ label:'치과병력 및 건강행태',     roman:'Ⅰ',  sub:'Dental Hygiene Assessment',         icon:'fa-notes-medical' },
  2:{ label:'전신병력 및 복용약물',     roman:'Ⅱ',  sub:'Medical History & Medication',       icon:'fa-heartbeat' },
  3:{ label:'구강 내/외 검사',          roman:'Ⅲ',  sub:'Intra & Extra Oral Examination',     icon:'fa-tooth' },
  4:{ label:'구강위생관리 PI 측정',     roman:'Ⅳ',  sub:'Oral Hygiene Care - PI',             icon:'fa-chart-bar' },
  5:{ label:'근거중심 치위생판단',      roman:'Ⅴ',  sub:'Evidence-based Judgement',           icon:'fa-brain' },
  6:{ label:'치위생 관리 목표 및 계획', roman:'Ⅵ',  sub:'Client Goals for Dental Hygiene Care', icon:'fa-bullseye' },
  7:{ label:'근거중심 치위생수행',      roman:'Ⅶ',  sub:'Evidence-based Implementation',      icon:'fa-hand-holding-medical' },
  8:{ label:'치위생 평가',              roman:'Ⅷ',  sub:'Dental Hygiene Evaluation',          icon:'fa-clipboard-check' },
  9:{ label:'목표 달성도 평가 및 자기평가', roman:'Ⅸ', sub:'Goal Achievement',               icon:'fa-trophy' }
};

// ── 선택된 섹션 목록 (원래 번호 순 정렬) ─────────────────────────
const selectedOrigNums = Object.entries(config.sections || {})
  .filter(([,s]) => s && s.selected)
  .map(([k]) => parseInt(k))
  .sort((a,b) => a-b);

// ── 섹션 그리드 렌더 (표시 번호: 1부터 순서대로) ─────────────────
const grid = document.getElementById('sectionGrid');
if (selectedOrigNums.length === 0) {
  grid.innerHTML = '<p class="text-gray-400 col-span-full text-center py-8">선택된 섹션이 없습니다.</p>';
} else {
  selectedOrigNums.forEach((origNum, idx) => {
    const displayNum = idx + 1;   // 표시 번호는 1부터 순서대로
    const m = SECTION_META[origNum];
    const btn = document.createElement('button');
    btn.className = 'section-button';
    btn.onclick = () => openSection(origNum, displayNum);
    btn.innerHTML = `
      <div style="display:flex;align-items:center;gap:14px;flex:1;">
        <div class="section-number">${displayNum}</div>
        <div style="text-align:left;">
          <div style="font-weight:700;font-size:15px;">${m.label}</div>
          <div style="font-size:12px;color:#6b7280;margin-top:2px;">${m.sub}</div>
        </div>
      </div>
      <i class="fas ${m.icon}" style="font-size:22px;color:#0059D7;opacity:0.6;"></i>
    `;
    grid.appendChild(btn);
  });
}

// ── 모달 열기/닫기 ────────────────────────────────────────────────
function openSection(origNum, displayNum) {
  const m = SECTION_META[origNum];
  document.getElementById('modalTitle').textContent =
    `Section ${displayNum} · ${m.roman}. ${m.label}`;
  document.getElementById('modalContent').innerHTML =
    renderSection(origNum, displayNum);
  document.getElementById('sectionModal').classList.add('open');
  document.getElementById('sectionModal').scrollTop = 0;
  if (origNum === 4) initPI();
}
function closeModal() {
  document.getElementById('sectionModal').classList.remove('open');
}
document.getElementById('sectionModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── 섹션 렌더 디스패처 ───────────────────────────────────────────
function renderSection(origNum, displayNum) {
  const renders = {1:sec1, 2:sec2, 3:sec3, 4:sec4, 5:sec5, 6:sec6, 7:sec7, 8:sec8, 9:sec9};
  const fn = renders[origNum] || (() => `<p class="text-gray-400 py-8 text-center">준비 중입니다.</p>`);
  return fn(displayNum) + `
    <div class="nosave-note">
      <i class="fa-solid fa-triangle-exclamation"></i>
      미리보기 모드 — 입력한 내용은 저장되지 않습니다
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// Section 1 · 치과병력 및 건강행태
// ═══════════════════════════════════════════════════════════════════
function sec1(dn) { return `

  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold" style="color:#0059D7;">Ⅰ. 치과병력 및 건강행태 (Dental Hygiene Assessment)</h2>
  </div>

  <div class="bg-white rounded-lg border-2 border-gray-200 p-6 mb-6">

      <h3 class="font-bold mb-3 text-blue-700"><i class="fas fa-clipboard-list mr-2"></i>대상자 방문이유</h3>
      <textarea rows="3" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 transition" placeholder="방문이유 입력"></textarea>
    </div>
    <div class="mb-6 pb-6 border-b-2 border-blue-100">
      <h3 class="font-bold mb-3 text-blue-700"><i class="fas fa-hospital mr-2"></i>주 치과명</h3>
      <input type="text" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 transition" placeholder="주로 이용하시는 치과 이름을 입력하세요">
    </div>

    <div class="mb-6">
      <h3 class="font-bold mb-3">Q1. 최근 1년 동안 치과 방문경험이 있습니까(보건소 포함)?</h3>
      <div class="flex gap-4 mb-2">
        <label class="flex items-center"><input type="radio" name="q1" value="no" class="mr-2"> 아니오</label>
        <label class="flex items-center"><input type="radio" name="q1" value="yes" class="mr-2"> 예</label>
      </div>
      <div class="ml-4">
        <p class="text-sm text-gray-600 mb-2">※ 치주치료 경험(진료사항, 부위):</p>
        <input type="text" class="w-full px-3 py-2 border-2 border-gray-300 rounded-lg" placeholder="진료사항 및 부위 입력">
      </div>
    </div>

    <div class="mb-6">
      <h3 class="font-bold mb-3">Q2. 현재 귀하의 건강행태에 대해 해당사항에 기입해 주십시오.</h3>

      <div class="bg-gray-50 p-4 rounded-lg mb-4">
        <h4 class="font-semibold mb-3">칫솔질 습관</h4>
        <div class="mb-3">
          <p class="text-sm font-medium mb-2">빈도:</p>
          <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
            ${['아침식사 전','아침식사 후','점심식사 전','점심식사 후','저녁식사 전','저녁식사 후','잠자기 전','칫솔질을 하지 않음'].map(v=>`<label class="flex items-center"><input type="checkbox" class="mr-2"> ${v}</label>`).join('')}
          </div>
        </div>
        <div>
          <p class="text-sm font-medium mb-2">방법: (다중선택 가능)</p>
          <div class="space-y-1">
            ${['잇몸에서부터 쓸어 내리듯이 닦는다','칫솔모를 잇몸 안쪽으로 살짝 삽입하여 진동을 주어 닦는다','가로방향으로 닦는다'].map(v=>`<label class="flex items-center"><input type="checkbox" class="mr-2"> ${v}</label>`).join('')}
          </div>
        </div>
      </div>

      <div class="bg-gray-50 p-4 rounded-lg mb-4">
        <h4 class="font-semibold mb-3">구강관리용품</h4>
        <div class="grid grid-cols-2 gap-2 mb-3">
          ${['치실','치간칫솔','구강양치액','워터픽','없음'].map(v=>`<label class="flex items-center"><input type="checkbox" class="mr-2"> ${v}</label>`).join('')}
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div><label class="block text-sm font-medium mb-1">칫솔:</label>
            <input type="text" class="w-full px-2 py-1 border rounded" placeholder="브랜드/종류 입력"></div>
          <div><label class="block text-sm font-medium mb-1">치약:</label>
            <input type="text" class="w-full px-2 py-1 border rounded" placeholder="브랜드/종류 입력"></div>
        </div>
      </div>

      <div class="bg-gray-50 p-4 rounded-lg mb-4">
        <h4 class="font-semibold mb-3">흡연</h4>
        <div class="space-y-2">
          <label class="flex items-center"><input type="radio" name="smoke" class="mr-2"> 흡연자: <input type="number" class="ml-2 w-20 px-2 py-1 border rounded" placeholder="0"> 개피/일</label>
          <div class="ml-6 grid grid-cols-2 gap-1">
            ${['일반 담배','전자담배'].map(v=>`<label class="flex items-center"><input type="checkbox" class="mr-2"> ${v}</label>`).join('')}
          </div>
          <label class="flex items-center"><input type="radio" name="smoke" class="mr-2"> 비흡연자</label>
          <label class="flex items-center"><input type="radio" name="smoke" class="mr-2"> 과거흡연자 (금연시기: <input type="text" class="ml-2 w-32 px-2 py-1 border rounded">)</label>
        </div>
        <input type="text" class="w-full mt-2 px-2 py-1 border rounded text-sm" placeholder="흡연 관련 서술 (선택사항)">
      </div>

      <div class="bg-gray-50 p-4 rounded-lg mb-4">

function calcAnxiety() {
  let t=0;
  for(let i=0;i<5;i++){const el=document.querySelector(`input[name="anxiety${i}"]:checked`);if(el)t+=parseInt(el.value);}
  const el=document.getElementById('anxTotal');if(el)el.textContent=t;
}

function initPI() { piMarked = {}; }
function togglePI(tooth, surf) {
  const key = `${tooth}_${surf}`;
  const el = document.getElementById(`pi_${tooth}_${surf}`);
  if (!el) return;
  if (piMarked[key]) { delete piMarked[key]; el.classList.remove('hit'); }
  else { piMarked[key] = true; el.classList.add('hit'); }
  const total = document.querySelectorAll('.pi-surf').length;
  const count = Object.keys(piMarked).length;
  const oleary = total > 0 ? (count/total*100).toFixed(1) : '0.0';
  const el1=document.getElementById('piCount'); if(el1)el1.textContent=count;
  const el2=document.getElementById('piTotal'); if(el2)el2.textContent=total;
  const el3=document.getElementById('piOleary'); if(el3)el3.textContent=oleary+'%';
  const el4=document.getElementById('piMod'); if(el4)el4.textContent=(100-parseFloat(oleary)).toFixed(1)+'%';
}
function clearAllPI() {
  piMarked = {};
  document.querySelectorAll('.pi-surf').forEach(el=>el.classList.remove('hit'));
  const el1=document.getElementById('piCount'); if(el1)el1.textContent='0';
  const el3=document.getElementById('piOleary'); if(el3)el3.textContent='0.0%';
  const el4=document.getElementById('piMod'); if(el4)el4.textContent='100.0%';
}

        </button>
      </div>

      <!-- 5매법 영역 -->
      <div id="pvMethod5Area" style="display:block;">
        <h3 style="font-size:18px;font-weight:800;color:#0059D7;text-align:center;margin-bottom:20px;">
          <i class="fas fa-camera-retro" style="margin-right:8px;"></i>5매법 (십자형 배치)
        </h3>
        <div style="display:flex;flex-direction:column;gap:20px;max-height:70vh;overflow-y:auto;padding:0 4px;">
          <!-- 세트 1 -->
          <div style="background:linear-gradient(135deg,#eff6ff,white);padding:28px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);border:2px solid #bfdbfe;">
            <h4 style="font-size:16px;font-weight:700;text-align:center;color:#374151;margin-bottom:20px;">세트 #1</h4>
            <div id="pvPhoto5Set1Area"></div>
          </div>
          <!-- 세트 2 -->
          <div style="background:linear-gradient(135deg,#f0fdf4,white);padding:28px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);border:2px solid #bbf7d0;">
            <h4 style="font-size:16px;font-weight:700;text-align:center;color:#374151;margin-bottom:20px;">세트 #2</h4>
            <div id="pvPhoto5Set2Area"></div>
          </div>
        </div>
      </div>

      <!-- 6매법 영역 -->
      <div id="pvMethod6Area" style="display:none;">
        <h3 style="font-size:18px;font-weight:800;color:#0059D7;text-align:center;margin-bottom:20px;">
          <i class="fas fa-camera-retro" style="margin-right:8px;"></i>6매법 (교합면&amp;설면 - 2×3 그리드)
        </h3>
        <div style="display:flex;flex-direction:column;gap:20px;max-height:70vh;overflow-y:auto;padding:0 4px;">
          <!-- 세트 1 -->
          <div style="background:linear-gradient(135deg,#faf5ff,white);padding:28px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);border:2px solid #e9d5ff;">
            <h4 style="font-size:16px;font-weight:700;text-align:center;color:#374151;margin-bottom:20px;">세트 #1</h4>
            <div id="pvPhoto6Set1Area"></div>
          </div>
          <!-- 세트 2 -->
          <div style="background:linear-gradient(135deg,#fff1f2,white);padding:28px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);border:2px solid #fecdd3;">
            <h4 style="font-size:16px;font-weight:700;text-align:center;color:#374151;margin-bottom:20px;">세트 #2</h4>
            <div id="pvPhoto6Set2Area"></div>
          </div>
        </div>
      </div>

      <!-- 하단 -->
      <div style="margin-top:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
        <p style="font-size:13px;color:#6b7280;display:flex;align-items:center;gap:6px;">
          <i class="fas fa-info-circle"></i>
          미리보기 모드입니다. 실제 차트에서 업로드 및 자동 저장됩니다.
        </p>
        <button onclick="closePhotoModalPv()"
          style="padding:9px 24px;border-radius:8px;border:1px solid #d1d5db;background:white;color:#374151;font-size:14px;font-weight:600;cursor:pointer;">
          닫기
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Photo 모달 JS (차트웹 동일 구조) ──────────────────────────────
window.pvCurrentVisit  = 1;
window.pvCurrentMethod = '5';

function openPhotoModalPv() {
  window.pvCurrentVisit  = 1;
  window.pvCurrentMethod = '5';
  pvSelectVisit(1);
  pvSelectMethod('5');
  pvRenderAll();
  document.getElementById('pvPhotoModal').style.display = 'flex';
}

function closePhotoModalPv() {
  document.getElementById('pvPhotoModal').style.display = 'none';
}

function pvSelectVisit(v) {
  window.pvCurrentVisit = v;
  [1,2,3].forEach(n => {
    const btn = document.getElementById('pvVisitBtn_' + n);
    if (!btn) return;
    if (n === v) {
      btn.style.background = '#3b82f6';
      btn.style.borderColor = '#3b82f6';
      btn.style.color = 'white';
    } else {
      btn.style.background = 'white';
      btn.style.borderColor = '#d1d5db';
      btn.style.color = '#374151';
    }
  });
  pvRenderAll();
}

function pvSelectMethod(m) {
  window.pvCurrentMethod = m;
  ['5','6'].forEach(k => {
    const btn = document.getElementById('pvMethodBtn_' + k);
    if (!btn) return;
    if (k === m) {
      btn.style.borderBottomColor = '#3b82f6';
      btn.style.color = '#2563eb';
    } else {
      btn.style.borderBottomColor = 'transparent';
      btn.style.color = '#6b7280';
    }
  });
  const a5 = document.getElementById('pvMethod5Area');
  const a6 = document.getElementById('pvMethod6Area');
  if (a5) a5.style.display = m === '5' ? 'block' : 'none';
  if (a6) a6.style.display = m === '6' ? 'block' : 'none';
}

function pvRenderAll() {
  pvRender5Set(window.pvCurrentVisit, 1, 'pvPhoto5Set1Area');
  pvRender5Set(window.pvCurrentVisit, 2, 'pvPhoto5Set2Area');
  pvRender6Set(window.pvCurrentVisit, 1, 'pvPhoto6Set1Area');
  pvRender6Set(window.pvCurrentVisit, 2, 'pvPhoto6Set2Area');
}

// 5매법 십자형 배치
function pvRender5Set(visit, setNum, areaId) {
  const area = document.getElementById(areaId);
  if (!area) return;
  area.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div>${pvSlot(visit,'5',setNum,1)}</div>
      <div style="display:flex;gap:12px;">
        ${pvSlot(visit,'5',setNum,2)}
        ${pvSlot(visit,'5',setNum,3)}
        ${pvSlot(visit,'5',setNum,4)}
      </div>
      <div>${pvSlot(visit,'5',setNum,5)}</div>
    </div>`;
}

// 6매법 2×3 그리드
function pvRender6Set(visit, setNum, areaId) {
  const area = document.getElementById(areaId);
  if (!area) return;
  area.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,auto);gap:12px;margin-bottom:12px;">
      ${pvSlot(visit,'6',setNum,1)}
      ${pvSlot(visit,'6',setNum,2)}
      ${pvSlot(visit,'6',setNum,3)}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,auto);gap:12px;">
      ${pvSlot(visit,'6',setNum,4)}
      ${pvSlot(visit,'6',setNum,5)}
      ${pvSlot(visit,'6',setNum,6)}
    </div>`;
}

// 개별 슬롯 렌더
function pvSlot(visit, template, setNum, slot) {
  const isMob = window.innerWidth <= 768;
  const w = template==='5' ? (isMob?'100px':'260px') : (isMob?'88px':'220px');
  const h = template==='5' ? (isMob?'75px':'195px')  : (isMob?'66px':'165px');
  const label = template==='5'
    ? ['','정면','좌측방','정면 교합','우측방','하악 교합'][slot]
    : ['','정면','좌측방','우측방','상악 교합','하악 교합','설면'][slot];
  return `
    <div onclick="alert('미리보기 모드입니다.\\n실제 차트에서 업로드 가능합니다.')"
         style="width:${w};height:${h};border:2px dashed #9ca3af;border-radius:8px;
                display:flex;flex-direction:column;align-items:center;justify-content:center;
                cursor:pointer;background:#fafafa;transition:all 0.15s;gap:4px;"
         onmouseover="this.style.borderColor='#0059D7';this.style.background='#eff6ff';"
         onmouseout="this.style.borderColor='#9ca3af';this.style.background='#fafafa';">
      <i class="fas fa-camera" style="font-size:${isMob?'14px':'22px'};color:#9ca3af;"></i>
      <span style="font-size:${isMob?'9px':'12px'};color:#9ca3af;font-weight:600;text-align:center;padding:0 4px;">${label || ('사진 '+slot)}</span>
      ${!isMob?`<span style="font-size:10px;color:#bbb;">클릭하여 업로드</span>`:''}
    </div>`;
}

// 모달 바깥 클릭 시 닫기
document.getElementById('pvPhotoModal').addEventListener('click', function(e) {
  if (e.target === this) closePhotoModalPv();
});
</script>
</body>
</html>
